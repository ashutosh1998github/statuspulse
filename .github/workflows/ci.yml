name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  build-and-test:
    name: Build and Integration Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=statuspulse
          DB_USER=statuspulse
          DB_PASSWORD=StrongPass123
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=
          APP_PORT=8000
          EOF

      - name: Build Docker image
        run: docker build -t statuspulse:latest .

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s http://localhost:8000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])" 2>/dev/null)
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Services are healthy!"
              break
            fi
            echo "Attempt $i: not ready yet..."
            sleep 3
          done

      - name: Run integration tests
        run: |
          chmod +x tests/test_integration.sh
          bash tests/test_integration.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/test-results.log

      - name: Tear down stack
        if: always()
        run: docker compose down -v